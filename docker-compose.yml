version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: origenix_admin
      POSTGRES_PASSWORD: origenix_secure_password_88!
      POSTGRES_DB: origenix_connect_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - origenix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U origenix_admin -d origenix_connect_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - origenix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8
    environment:
      MONGO_INITDB_ROOT_USERNAME: origenix_admin
      MONGO_INITDB_ROOT_PASSWORD: origenix_secure_password_88!
      MONGO_INITDB_DATABASE: origenix_connect_ai
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - origenix-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - origenix-network

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  qdrant_data:

networks:
  origenix-network:
    driver: bridge
